<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420" role="img" aria-labelledby="title desc">
  <title id="title">Geotechnical research workstation</title>
  <desc id="desc">A dark scientific workstation with monitors displaying a borehole log, soil layers, contour lines, and a computational mesh.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117" />
      <stop offset="1" stop-color="#102b3a" />
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071820" />
      <stop offset="1" stop-color="#0c3442" />
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#25364a" />
      <stop offset="1" stop-color="#172b36" />
    </linearGradient>
    <linearGradient id="strata" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff" />
      <stop offset="0.5" stop-color="#a371f7" />
      <stop offset="1" stop-color="#2dd4bf" />
    </linearGradient>
    <pattern id="room-grid" width="32" height="32" patternUnits="userSpaceOnUse">
