<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title desc">
  <title id="title">Dark geotechnical profile banner</title>
  <desc id="desc">An abstract subsurface cross-section with layered strata, topographic contours, a borehole, and a finite-element mesh.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117" />
      <stop offset="0.55" stop-color="#111827" />
      <stop offset="1" stop-color="#0b2634" />
    </linearGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.7" />
      <stop offset="0.55" stop-color="#a371f7" stop-opacity="0.45" />
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0.65" />
    </linearGradient>
    <linearGradient id="strata-one" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f3b52" />
      <stop offset="1" stop-color="#164e63" />
    </linearGradient>
    <linearGradient id="strata-two" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#312e5a" />
      <stop offset="1" stop-color="#1f4d5d" />
    </linearGradient>
    <linearGradient id="strata-three" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a3047" />
      <stop offset="0.55" stop-color="#2d3f55" />
      <stop offset="1" stop-color="#143e46" />
